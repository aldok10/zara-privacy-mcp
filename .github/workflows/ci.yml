name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

      - name: Test with coverage
        run: |
          go test -count=1 -race -coverprofile=coverage.out ./...
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          if [ $(echo "$COVERAGE < 30" | bc -l) -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below 30% threshold"
            exit 1
          fi
        env:
          ZARA_ENCRYPTION_KEY: "ci-test-key-32-bytes-long-minimum!!"

      - name: Lint
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          make lint

      - name: Vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Smoke test
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}' \
            | ZARA_ENCRYPTION_KEY="ci-test-key-32-bytes-long-minimum!!" ./zara-privacy-mcp --stdio 2>/dev/null \
            | python3 -c "import sys,json; d=json.load(sys.stdin); assert len(d['result']['tools']) == 21, f'Expected 21 tools, got {len(d[\"result\"][\"tools\"])}'"
