name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

      - name: Test
        run: make test
        env:
          ZARA_ENCRYPTION_KEY: "ci-test-key-32-bytes-long-minimum!!"

      - name: Lint
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          make lint

      - name: Smoke test
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}' \
            | ZARA_ENCRYPTION_KEY="ci-test-key-32-bytes-long-minimum!!" ./zara-privacy-mcp --stdio 2>/dev/null \
            | python3 -c "import sys,json; d=json.load(sys.stdin); assert len(d['result']['tools']) == 19, f'Expected 19 tools, got {len(d[\"result\"][\"tools\"])}'"
